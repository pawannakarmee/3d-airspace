<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Airspace Map (2D/3D Unified)</title>

    <!-- Leaflet (2D) -->
    <link rel="stylesheet" href="./vendor/leaflet.css" />
    <script src="./vendor/leaflet.js"></script>

    <!-- Cesium (3D) -->
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>

    <!-- App styles -->
    <script type="module" crossorigin src="./assets/index-DURLFHoz.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CmdmOkFD.css">
  </head>

  <body>
    <!-- TOP BAR (single UI for both engines) -->
    <div id="topBar" class="topbar">
      <div class="topbar__left">
        <!-- Cesium will inject its Search + buttons here in 3D mode -->
        <div id="cesiumControls" class="cesium-controls"></div>

        <button id="btnMode" class="btn">Mode: <span id="modeLabel">2D</span></button>
        <button id="btnHome" class="btn">Home</button>
      </div>

      <div class="topbar__center">
        <div class="dropdown" id="ddLayers">
          <button class="btn" id="btnLayers">Map Layers ▸</button>
          <div class="panel" id="panelLayers">
            <label><input id="togAirspace" type="checkbox" checked /> Airspace Boundary</label>
            <label><input id="togSectors" type="checkbox" checked /> Sectors</label>
            <label><input id="togAirways" type="checkbox" checked /> Airways</label>
            <hr />
            <label><input id="togFixes" type="checkbox" checked /> Fixes</label>
            <label><input id="togFixNames" type="checkbox" checked /> Fix Names</label>
            <div class="muted">Fixes hides triangles only. Names are controlled by “Fix Names”.</div>
          </div>
        </div>

        <div class="dropdown" id="ddSectors">
          <button class="btn" id="btnSectors">Sectors ▸</button>
          <div class="panel" id="panelSectors">
            <label class="high"><input type="checkbox" id="selectHighSectors" checked /> High</label>
            <label class="low"><input type="checkbox" id="selectLowSectors" checked /> Low</label>
            <hr />
            <div id="sectorCheckboxList"></div>
            <hr />
            <label><input type="checkbox" id="showSectorColors" checked /> Show (sector colors)</label>
            <div class="muted">When OFF, sectors are hidden.</div>
          </div>
        </div>

        <div id="zWrap" class="zwrap">
          <span>Vertical:</span>
          <input id="zScale" type="range" min="1" max="15" step="0.5" value="3" />
          <span id="zVal">3.0x</span>
        </div>
      </div>

      <div class="topbar__right">
        <!-- Route pair panel toggle -->
        <div id="rpToggle" class="rp-toggle is-open" title="Route Pairs">
          <div class="rp-arrow"></div>
        </div>
      </div>
    </div>

    <!-- MAP CONTAINERS (we keep both and show one) -->
    <div id="map2d" class="map map--active"></div>
    <div id="map3d" class="map"></div>

    <!-- ROUTE PAIRS PANEL -->
    <div id="routePanel">
      <div id="routeFilters">
        <button class="filter-btn selected" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Arr">Arr</button>
        <button class="filter-btn" data-filter="Dep">Dep</button>
        <button class="filter-btn" data-filter="Ovf">Ovf</button>
        <button class="filter-btn" data-filter="FRA">FRA</button>
      </div>
      <div id="routeList"></div>
    </div>

    <!-- Shared app logic -->
  </body>
</html>
